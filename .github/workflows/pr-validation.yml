name: PR Validation

on:
  pull_request:
    branches: [main]

# OIDC トークン取得に必要なパーミッション
permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: infra

      # OIDC で AWS 認証（アクセスキー不要）
      # ポイント: id-token: write パーミッションがないとこのステップが失敗する
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # PR では synth のみ実行（デプロイしない）
      # cdk synth = CDK コードを CloudFormation テンプレートに変換するだけ
      - name: CDK Synth (validation only)
        run: npx cdk synth
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
